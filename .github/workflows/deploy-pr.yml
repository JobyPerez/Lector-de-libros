name: Deploy Pull Request

"on":
  workflow_dispatch:
    inputs:
      pr_number:
        description: Numero del pull request a desplegar
        required: true

concurrency:
  group: deploy-server
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy_pr:
    name: Resolve PR and deploy
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 20
    env:
      DEPLOY_PATH: /home/ubuntu/DEV-JPG/Lector-de-libros

    steps:
      - name: Validate deployment path
        run: |
          test -d "$DEPLOY_PATH"
          test -d "$DEPLOY_PATH/.git"

      - name: Validate runtime dependencies
        run: |
          command -v git
          command -v node
          command -v npm
          command -v pm2

      - name: Mark repository as safe
        run: git config --global --add safe.directory "$DEPLOY_PATH"

      - name: Resolve PR branch
        id: pr
        uses: actions/github-script@v7
        env:
          PR_NUMBER_INPUT: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER_INPUT);

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed('pr_number debe ser un entero positivo.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('state', pr.state);
            core.setOutput('base_branch', pr.base.ref);
            core.setOutput('target_branch', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);

      - name: Log resolved PR target
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          PR_STATE: ${{ steps.pr.outputs.state }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_branch }}
          TARGET_BRANCH: ${{ steps.pr.outputs.target_branch }}
          HEAD_REPO: ${{ steps.pr.outputs.head_repo }}
        run: |
          echo "Workflow ref: ${{ github.ref_name }}"
          echo "Pull request: #$PR_NUMBER"
          echo "PR state: $PR_STATE"
          echo "PR base branch: $BASE_BRANCH"
          echo "PR target branch: $TARGET_BRANCH"
          echo "PR head repository: $HEAD_REPO"

      - name: Validate PR is deployable
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          PR_STATE: ${{ steps.pr.outputs.state }}
          TARGET_BRANCH: ${{ steps.pr.outputs.target_branch }}
          HEAD_REPO: ${{ steps.pr.outputs.head_repo }}
        run: |
          if [ "$PR_STATE" != "open" ]; then
            echo "Solo se despliegan pull requests abiertos."
            exit 1
          fi

          if [ "$HEAD_REPO" != "${{ github.repository }}" ]; then
            echo "Solo se despliegan PRs cuya rama head existe en este mismo repositorio."
            exit 1
          fi

          git ls-remote --exit-code --heads origin "$TARGET_BRANCH"

      - name: Update repository
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          TARGET_BRANCH: ${{ steps.pr.outputs.target_branch }}
        run: |
          git fetch origin "$TARGET_BRANCH":"refs/remotes/origin/$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          git branch --set-upstream-to="origin/$TARGET_BRANCH" "$TARGET_BRANCH"
          git pull --ff-only origin "$TARGET_BRANCH"

      - name: Install dependencies
        working-directory: ${{ env.DEPLOY_PATH }}
        run: npm ci

      - name: Build project
        working-directory: ${{ env.DEPLOY_PATH }}
        run: npm run build

      - name: Restart API
        working-directory: ${{ env.DEPLOY_PATH }}
        run: pm2 restart conejolector-api