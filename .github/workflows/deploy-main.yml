name: Deploy Branch

"on":
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Rama a desplegar en el servidor
        required: true
        default: main

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and restart API
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 20
    env:
      DEPLOY_PATH: /home/ubuntu/DEV-JPG/Lector-de-libros
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}

    steps:
      - name: Validate deployment path
        run: |
          test -d "$DEPLOY_PATH"
          test -d "$DEPLOY_PATH/.git"

      - name: Validate runtime dependencies
        run: |
          command -v git
          command -v npm
          command -v pm2

      - name: Mark repository as safe
        run: git config --global --add safe.directory "$DEPLOY_PATH"

      - name: Update repository
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          git fetch origin "$TARGET_BRANCH"
          git checkout "$TARGET_BRANCH"
          git pull --ff-only origin "$TARGET_BRANCH"

      - name: Install dependencies
        working-directory: ${{ env.DEPLOY_PATH }}
        run: npm ci

      - name: Build project
        working-directory: ${{ env.DEPLOY_PATH }}
        run: npm run build

      - name: Restart API
        working-directory: ${{ env.DEPLOY_PATH }}
        run: pm2 restart conejolector-api